<body>

    </div>
    <div class = "message">
        Hi! Look at this awsome pendulum simulation! 
    </div>
    <canvas id="simCanvas" width="1200" height=" 400"></canvas>
    <input id ="angleSlider" type = "range" min = "-90" max = "90" value = "0">
    

    
</body>

<script>
    const canvas = document.getElementById("simCanvas");
    const ctx = canvas.getContext("2d");
    const slider = document.getElementById("angleSlider");
    
    
    let r = 12; // radius of the ball. 
    let len = 200; // lenth of the sring
    let theta = Math.PI * 0; // the angle that the user can change
    let x = 600 + len* Math.sin(theta); // the x position that changes based on what theta is. 
    let y = 50 + len* Math.cos(theta);// smad here put with y 
    let h = Math.abs(x-600);// thus us the actuall units long the triangle formed by the pendulum are. 
    let w = Math.abs(y-50); // same here
    
    let g = 9.81; // this is gravity, duh! 
    let omega  = 0; 
    let dt = 0.16; // time constant, pretending like this will be the time from each "frame"
    let alpha = -(g/len)* Math.sin(theta);
    


    
    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.arc(600,50,5,0, Math.PI*2);
    ctx.fill();

    ctx.fillStroke = "black";
    ctx.beginPath();
    ctx.moveTo(600,55);
    ctx.lineTo(x,(y));
    ctx.stroke();

    ctx.fillStyle = "blue";
    ctx.beginPath();
    ctx.arc(x,y,r,0, Math.PI*2); /* arc ( x,y, radius, start angle, end angle)*/
    ctx.fill();

    // first the user updates the theta
    slider.addEventListener("input", function() {
        theta = (Number(slider.value) * Math.PI)/180;
    });
        

    

    
    function animate (){
        
        
        alpha = -(g/len)* Math.sin(theta)
        omega = omega + alpha * dt;

        //okay x = x- Math.sin(theta-(Math.PI/4));
       // y = y-  Math.cos(theta-(Math.PI/4));

       theta = theta + omega * dt; 

        x = 600 + len* Math.sin(theta); 
        y = 50 + len* Math.cos(theta);

        

        ctx.clearRect(0,0,1200,400);

        ctx.fillStroke = "black";
        ctx.beginPath();
        ctx.moveTo(600,50)
        ctx.lineTo(x,(y))
        ctx.stroke();

        ctx.fillStyle = "blue";
        ctx.beginPath();
        ctx.arc(x,y,r,0, Math.PI*2); /* arc ( x,y, radius, start angle, end angle)*/
        ctx.fill();

        ctx.fillStyle = "black";
        ctx.beginPath();
        ctx.arc(600,50,5,0, Math.PI*2);
        ctx.fill();
        

        requestAnimationFrame(animate);
        }

    animate();


    

    
</script>


</html>
